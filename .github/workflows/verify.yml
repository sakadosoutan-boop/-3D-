name: Verify single HTML

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify HTML bundle
        run: node scripts/verify-html.js

  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright (chromium)
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm i -D playwright >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Smoke test (起動・全モード開始・音ON/OFF・季節時刻切替)
        run: node scripts/smoke-playwright.js
